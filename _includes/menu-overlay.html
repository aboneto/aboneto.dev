<div id="menu-overlay" class="overlay" aria-hidden="true" aria-modal="true">
  <div class="overlay-head">
    <div class="overlay-head-inner">
      <div class="wordmark">
        <span class="prompt">$</span>
        <span>cd</span>
        <span class="path">~/aboneto.dev</span>
      </div>
      <button class="overlay-close" aria-label="Cerrar menú" title="Cerrar menú"></button>
    </div>
  </div>
  <div class="overlay-prompt">
    <div class="overlay-prompt-inner">
      <span>$</span> <span class="cmd">ls -la categories/</span><span class="cursor"></span>
    </div>
  </div>
  <div class="overlay-body">
    {% include category-list.html %}
    <div class="overlay-side">
      <div class="side-label">// recent_posts · últimas 4</div>
      {% for post in site.posts limit:4 %}
      <a href="{{ post.url | relative_url }}" class="it">
        <div class="t">{{ post.title }}</div>
        <div class="m">{{ post.date | date: '%d %b %Y' }} · ~{% include reading_time.html post=post %}min</div>
      </a>
      {% endfor %}
    </div>
  </div>
</div>
