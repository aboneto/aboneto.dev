{% if site.onesignal.enabled %}
<script defer src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "{{ site.onesignal.app_id }}"{% if site.onesignal.safari_web_id and site.onesignal.safari_web_id != "" %},
      safari_web_id: "{{ site.onesignal.safari_web_id }}"{% endif %},
      notifyButton: { enable: false },
      slidedown: {
        prompts: [{
          type: "push",
          autoPrompt: true,
          delay: {
            pageViews: 1,
            timeDelay: {{ site.onesignal.prompt_delay_seconds | default: 30 }}
          },
          text: {
            actionMessage: "Recibe un aviso cuando publique un nuevo artículo.",
            acceptButton: "Suscribirse",
            cancelButton: "Ahora no"
          }
        }]
      }
    });
  });
</script>
{% endif %}
