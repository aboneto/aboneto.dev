<header class="topbar">
  <div class="topbar-inner">
    <div class="wordmark">
      <span class="prompt">$</span>
      <a href="/" class="wordmark-link" title="ir a la home" aria-label="ir a la home">
        <span>cd</span>
        <span class="path">~/aboneto.dev</span>
      </a>
      <span class="cursor" role="button" tabindex="0" aria-label="activar terminal" data-terminal-cursor></span>
      <span class="kbd">⌘.</span>
      <input class="wordmark-input" type="text" aria-label="terminal command" placeholder="cd ~/aboneto.dev" autocomplete="off" spellcheck="false" data-terminal-input>
    </div>
    <div class="topbar-right">
      <a href="/archivo">/archivo</a>
      <a href="/feed.xml">/feed.xml</a>
      <button class="hamburger" aria-label="Menú" title="Menú" aria-expanded="false" aria-controls="menu-overlay"><span
          class="hamburger-line"></span></button>
    </div>
  </div>
</header>
