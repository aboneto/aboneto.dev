# OneSignal Web Push — set enabled: true after adding App ID and GitHub secret
onesignal:
  enabled: true
  app_id: "3f9d8495-08e9-49c6-a644-dd497f13b73a"
  safari_web_id: "web.onesignal.auto.1f13959d-363e-4480-ae37-ce4b59dbb72b"
  prompt_delay_seconds: 30  # Seconds before slidedown appears on post pages

title: "aboneto.dev"
description: "Escribo sobre IA aplicada, infraestructura y arquitectura. Cosas que pruebo, mido y uso en el día a día."
url: "https://aboneto.dev"
author: "Antonio Barbosa"
lang: es

paginate: 12
paginate_path: "articulos/:num/"
permalink: /:title

sass:
  style: compressed

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/aboneto.dev.webp

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-archives
  - jekyll-gzip
  - jekyll-minifier

jekyll-archives:
  enabled:
    - categories
  layouts:
    category: category
  permalinks:
    category: /categoria/:name/

exclude:
  - mockup/
  - .agents/
  - .claude/
  - .opencode/
  - .rtk/
  - docs/
  - openspec/
  - scripts/
  - Gemfile
  - Gemfile.lock
  - AGENTS.md
  - CLAUDE.md
  - LICENSE
  - opencode.json
  - skills-lock.json
  - assets/images
  - test
  - node_modules
  - package.json
  - package-lock.json
  - README.md
  - jest.config.js
  - playwright.config.js
  - e2e
